<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualityHub - Elite Document Management System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE SYSTEM VARIABLES (Paleta Azul Premium Neón) --- */
        :root {
            --bg-body: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #1e40af;
            --primary-gradient: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            --accent: #3b82f6;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --card-glow: rgba(30, 64, 175, 0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-body: #080c14;
            --bg-card: rgba(21, 31, 50, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #1d4ed8 0%, #10b981 100%);
            --accent: #10b981;
            --border-color: #1e293b;
            --input-bg: #111827;
            --card-glow: rgba(59, 130, 246, 0.15);
        }

        /* --- CONFIGURACIÓN BASE --- */
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* --- INTERRUPTOR DE TEMA TIPO COMPONENT --- */
        .theme-switch-wrapper {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1050;
        }
        .btn-theme {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: var(--transition);
        }
        .btn-theme:hover {
            transform: scale(1.1) rotate(20deg);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--card-glow);
        }

        /* --- ANIMACIONES DE ENTRADA CINEMÁTICA --- */
        @keyframes launchIntro {
            from { opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .animated-gate {
            animation: launchIntro 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- LOGIN FUTURISTA --- */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 45px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1), var(--card-glow);
            position: relative;
        }
        .login-glass-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: var(--primary-gradient); border-radius: 24px 24px 0 0;
        }
        .brand-sphere {
            width: 80px; height: 80px; background: var(--primary-gradient);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto; color: white; font-size: 32px;
            box-shadow: 0 15px 30px rgba(30, 64, 175, 0.3);
        }

        /* --- DISEÑO COMPONENTES FORMULARIO --- */
        .form-label-custom {
            font-size: 11px; font-weight: 700; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
        }
        .form-control-custom {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-main) !important;
            border-radius: 12px; padding: 12px 16px;
            font-weight: 500; transition: var(--transition);
        }
        .form-control-custom:focus {
            box-shadow: 0 0 0 4px var(--card-glow) !important;
            border-color: var(--primary) !important;
        }

        .btn-submit-premium {
            background: var(--primary-gradient); color: white !important;
            border: none; border-radius: 12px; padding: 14px;
            font-weight: 700; font-size: 15px; letter-spacing: 0.5px;
            transition: var(--transition); box-shadow: 0 10px 20px rgba(30, 64, 175, 0.2);
        }
        .btn-submit-premium:hover {
            transform: translateY(-3px); box-shadow: 0 15px 30px rgba(30, 64, 175, 0.35);
            opacity: 0.95;
        }

        /* --- DASHBOARD CENTRAL (DOS COLUMNAS) --- */
        #main-view { display: none; padding: 40px 20px; }
        
        .glass-sidebar {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            position: sticky; top: 40px; backdrop-filter: blur(10px);
        }
        
        .glass-main-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
        }

        /* Banner Informativo */
        .top-status-bar {
            background: var(--primary-gradient); color: white;
            padding: 16px 30px; border-radius: 16px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 12px 25px rgba(30, 64, 175, 0.15);
        }

        /* Kpi Mini Cards */
        .kpi-mini-card {
            background: var(--bg-body); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 15px 20px; display: flex; align-items: center;
            gap: 15px; transition: var(--transition);
        }
        .kpi-mini-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .kpi-icon {
            width: 45px; height: 45px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; font-size: 18px; color: white;
        }

        /* --- ACCIONES CON DISEÑO DE BOTÓN DE ACCIÓN FLUIDO --- */
        .actions-wrapper { display: flex; gap: 10px; justify-content: center; }
        .action-pill {
            padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700;
            border: none; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px;
            text-decoration: none !important;
        }
        
        .pill-view { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .pill-view:hover { background: #10b981; color: white; transform: translateY(-3px); box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2); }
        
        .pill-info { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .pill-info:hover { background: #3b82f6; color: white; transform: translateY(-3px); box-shadow: 0 8px 15px rgba(59, 130, 246, 0.2); }
        
        .pill-download { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
        .pill-download:hover { background: #8b5cf6; color: white; transform: translateY(-3px); box-shadow: 0 8px 15px rgba(139, 92, 246, 0.2); }

        /* --- FILAS DE TABLA PREMIUM --- */
        .table-premium { margin: 0; width: 100%; }
        .table-premium th {
            background: transparent; color: var(--text-muted); font-size: 11px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            padding: 18px 24px; border-bottom: 2px solid var(--border-color);
        }
        .table-premium td {
            padding: 22px 24px; vertical-align: middle; border-bottom: 1px solid var(--border-color);
        }
        .table-premium tr { transition: var(--transition); }
        .table-premium tbody tr:hover {
            background-color: var(--primary-light);
            transform: scale(1.002);
        }

        /* --- FILE ICONS ENHANCED --- */
        .corporate-file-badge {
            font-weight: 800; padding: 8px 14px; border-radius: 10px; font-size: 11px;
            letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 6px;
            min-width: 85px; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .badge-pdf { background: #fee2e2; color: #dc2626; }
        .badge-word { background: #e0f2fe; color: #0369a1; }
        .badge-excel { background: #dcfce7; color: #15803d; }
        .badge-power { background: #ffedd5; color: #c2410c; }
        
        /* Badges de Estado */
        .status-pill {
            padding: 6px 14px; border-radius: 30px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px; display: inline-block;
        }
        .status-pill-auth { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .status-pill-rev { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }

        /* --- MODAL CRISTALIZADO --- */
        .modal-content-custom {
            background: var(--bg-card); backdrop-filter: blur(15px);
            border: 1px solid var(--border-color); border-radius: 24px;
            padding: 20px; box-shadow: var(--shadow);
        }
    </style>
</head>
<body>

    <div class="theme-switch-wrapper">
        <button class="btn btn-theme" onclick="toggleTheme()">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div id="login-view" class="login-container">
        <div class="login-glass-card animated-gate">
            <div class="brand-sphere">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2>QualityHub</h2>
            <p class="subtitle">Ecosistema Seguro de Distribución</p>
            
            <div class="mb-3">

            </div>
            <div class="mb-4">
                <label class="form-label-custom">Contraseña Corporativa</label>

            <div class="row mb-3">

            <button class="btn btn-submit-premium w-100 mt-3" onclick="procesarLogin()">
                Aceder al Ecosistema <i class="fa-solid fa-arrow-right ms-2"></i>

        </div>
    </div>

    <div id="main-view" class="container-fluid animated-gate">
        
        <div id="user-banner" class="top-status-bar"></div>

        <div class="row g-4">
            
            <div class="col-lg-3">
                <div class="glass-sidebar">
                    <h5 class="fw-800 mb-4" style="letter-spacing:-0.5px;"><i class="fa-solid fa-sliders me-2 text-primary"></i>Filtros Avanzados</h5>
                    
                    <div class="mb-3">
                        <label class="form-label-custom">Palabra Clave</label>
                        <div class="input-group">
                            <input type="text" id="search-name" class="form-control form-control-custom" placeholder="Buscar documento...">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label-custom">Formato de Extensión</label>
                        <select id="search-type" class="form-select form-control-custom">
                            <option value="Todos">Todos los Formatos</option>
                            <option value="PDF">Documento PDF</option>
                            <option value="PowerPoint">Presentación PowerPoint</option>
                            <option value="Excel">Hoja Excel</option>
                            <option value="Word">Plantilla Word</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label-custom">Fecha de Emisión</label>
                        <input type="date" id="search-date" class="form-control form-control-custom">
                    </div>

                    <button class="btn btn-submit-premium w-100" onclick="cargarDocumentos()">
                        <i class="fa-solid fa-magnifying-glass me-2"></i> Ejecutar Filtro

            </div>

            <div class="col-lg-9">
                
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="kpi-mini-card">
                            <div class="kpi-icon" style="background:#3b82f6;"><i class="fa-solid fa-folder-open"></i></div>
                            <div>
                                <small class="text-muted d-block font-weight-bold">Ecosistema</small>
                                <span class="fw-bold">Documentos Totales</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="kpi-mini-card">
                            <div class="kpi-icon" style="background:#10b981;"><i class="fa-solid fa-circle-check"></i></div>
                            <div>
                                <small class="text-muted d-block">Estado Favorable</small>
                                <span class="fw-bold text-success">Autorizados</span>

                    </div>
                    <div class="col-md-4">

                    <div class="table-responsive">

    <div class="modal fade" id="metadataBootstrapModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-custom">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-800"><i class="fa-solid fa-circle-info text-primary me-2"></i>Metadatos y Auditoría</h5>

                    </div>

                        <input type="text" id="modal-autor" class="form-control form-control-custom" readonly style="opacity:0.6;">
                    </div>
                    <div class="row mb-2">
                        <div class="col-6">
                            <label class="form-label-custom">Compañía Destino</label>
                            <input type="text" id="modal-compania" class="form-control form-control-custom">
                        </div>
                        <div class="col-6">
                            <label class="form-label-custom">Departamento</label>
                            <input type="text" id="modal-departamento" class="form-control form-control-custom">
                        </div>
                    </div>
                    <div class="mb-3">

                        <input type="text" id="modal-clasificacion" class="form-control form-control-custom">
                    </div>
                    <div>
                        <label class="form-label-custom">Estado de Autorización</label>
                        <select id="modal-autorizado" class="form-select form-control-custom" disabled style="opacity:0.6; font-weight:700;">

                            <option value="En Revisión (No)">En Revisión (No)</option>
                        </select>

                    <button type="button" class="btn btn-secondary px-4" style="border-radius:10px;" onclick="cerrarModal()">Cerrar</button>
                    <button type="button" class="btn btn-success px-4" style="border-radius:10px;" onclick="guardarCambiosMetadatos()">💾 Guardar Cambios</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let datosUsuario = null;
        let bsModalInstance = null;

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const toggleIcon = document.getElementById('theme-icon');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                toggleIcon.className = 'fa-solid fa-moon';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                toggleIcon.className = 'fa-solid fa-sun';
            }
        }

        async function procesarLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const companiaSeleccionada = document.getElementById('login-compania').value;
            const deptoSeleccionado = document.getElementById('login-departamento').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usuario: u, contrasena: p })
            });

            const data = await res.json();
            if (res.ok) {
                datosUsuario = {
                    usuario: data.usuario,
                    compania: companiaSeleccionada,
                    departamento: deptoSeleccionado
                };

                document.getElementById('login-view').style.setProperty('display', 'none', 'important');
                document.getElementById('main-view').style.display = 'block';
                
                document.getElementById('user-banner').innerHTML = 
                    `<div class="d-flex align-items-center gap-3"><i class="fa-solid fa-user-tie fs-4"></i> <span>Ecosistema Activo de: <strong class="text-uppercase">${datosUsuario.usuario}</strong></span></div>
                     <div class="d-flex gap-4 font-size-13 fw-600"><span>Compañía: <strong>${datosUsuario.compania}</strong></span><span>Departamento: <strong>${datosUsuario.departamento}</strong></span></div>`;
                
                cargarDocumentos();
            } else {
                alert(data.error || "Credenciales incorrectas");
            }
        }

        async function cargarDocumentos() {
            if (!datosUsuario) return;
            
            const nombre = document.getElementById('search-name').value;
            const tipoFiltro = document.getElementById('search-type').value;
            const fecha = document.getElementById('search-date').value;
            
            let url = `/api/buscar?compania=${encodeURIComponent(datosUsuario.compania)}&departamento=${encodeURIComponent(datosUsuario.departamento)}`;
            
            if (nombre) url += `&nombre=${encodeURIComponent(nombre)}`;
            if (fecha) url += `&fecha=${encodeURIComponent(fecha)}`;

            if (tipoFiltro !== 'Todos') {
                url += `&tipo=${encodeURIComponent(tipoFiltro)}`;
                if (tipoFiltro === 'Word') url += `&extension=docx&ext=doc&tipo_doc=Word`;
                else if (tipoFiltro === 'Excel') url += `&extension=xlsx&ext=xls&tipo_doc=Excel`;
                else if (tipoFiltro === 'PDF') url += `&extension=pdf&tipo_doc=PDF`;
                else if (tipoFiltro === 'PowerPoint') url += `&extension=pptx&ext=ppt&tipo_doc=PowerPoint`;
            }

            try {
                const res = await fetch(url);
                let documentos = await res.json();
                
                if (tipoFiltro !== 'Todos') {
                    documentos = documentos.filter(doc => {
                        const nom = doc.nombre ? String(doc.nombre).toLowerCase() : '';
                        const tip = doc.tipo ? String(doc.tipo).toLowerCase() : '';
                        const arc = doc.archivo_descarga ? String(doc.archivo_descarga).toLowerCase() : '';
                        
                        if (tipoFiltro === 'Word') return nom.includes('.doc') || nom.includes('auditoría') || nom.includes('productos') || tip.includes('word') || tip.includes('docx') || arc.includes('.doc');
                        if (tipoFiltro === 'Excel') return nom.includes('.xls') || nom.includes('riesgos') || tip.includes('excel') || tip.includes('xlsx') || arc.includes('.xls');
                        if (tipoFiltro === 'PDF') return nom.includes('.pdf') || tip.includes('pdf') || arc.includes('.pdf');
                        if (tipoFiltro === 'PowerPoint') return nom.includes('.ppt') || tip.includes('powerpoint') || tip.includes('pptx') || arc.includes('.ppt');
                        return true;
                    });
                }
                
                const tbody = document.getElementById('document-rows');
                tbody.innerHTML = '';

                if (documentos.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-5 fw-600"><i class="fa-solid fa-box-open d-block fs-2 mb-2"></i> No se hallaron registros en este ecosistema.</td></tr>`;
                    return;
                }

                documentos.forEach(doc => {
                    const isAuth = doc.estado === 'Authorized' || doc.estado === 'Autorizado';
                    const statusClass = isAuth ? 'status-pill-auth' : 'status-pill-rev';
                    const statusText = isAuth ? 'Autorizado' : 'En Revisión';
                    const archivoEncodeado = encodeURIComponent(doc.archivo_descarga || '');
                    
                    let badgeExtension = `<span class="corporate-file-badge badge-word"><i class="fa-solid fa-file-word"></i> WORD</span>`;
                    const nomDoc = doc.nombre ? String(doc.nombre).toLowerCase() : '';
                    const tipDoc = doc.tipo ? String(doc.tipo).toLowerCase() : '';
                    const arcDoc = doc.archivo_descarga ? String(doc.archivo_descarga).toLowerCase() : '';
                    
                    if (nomDoc.includes('.pdf') || tipDoc.includes('pdf') || arcDoc.includes('.pdf')) {
                        badgeExtension = `<span class="corporate-file-badge badge-pdf"><i class="fa-solid fa-file-pdf"></i> PDF</span>`;
                    } else if(nomDoc.includes('.xls') || nomDoc.includes('riesgos') || tipDoc.includes('excel') || tipDoc.includes('xlsx') || arcDoc.includes('.xls')) {
                        badgeExtension = `<span class="corporate-file-badge badge-excel"><i class="fa-solid fa-file-excel"></i> EXCEL</span>`;
                    } else if(nomDoc.includes('.ppt') || tipDoc.includes('powerpoint') || tipDoc.includes('pptx') || arcDoc.includes('.ppt')) {
                        badgeExtension = `<span class="corporate-file-badge badge-power"><i class="fa-solid fa-file-powerpoint"></i> PPTX</span>`;
                    }
                    
                    let botonVer = `<a href="/api/ver/${archivoEncodeado}" target="_blank" class="action-pill pill-view"><i class="fa-solid fa-eye"></i> Ver</a>`;
                    let botonMeta = `<button onclick="abrirMetadatos('${archivoEncodeado}')" class="action-pill pill-info"><i class="fa-solid fa-circle-info"></i> Info</button>`;
                    let botonDescargar = `<span class="text-muted fs-7 opacity-50 fw-bold"><i class="fa-solid fa-lock"></i> Bloqueado</span>`;
                    
                    if (isAuth) {
                        botonDescargar = `<a href="/api/descargar/${archivoEncodeado}" class="action-pill pill-download"><i class="fa-solid fa-circle-down"></i> Bajar</a>`;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td><div class="d-flex align-items-center gap-2">${badgeExtension}<span class="fw-600 text-main">${doc.nombre || 'Sin título corporativo'}</span></div></td>
                            <td class="text-center text-muted fw-600">${doc.fecha || '2026-05-27'}</td>
                            <td class="text-center"><span class="status-pill ${statusClass}">${statusText}</span></td>
                            <td><div class="actions-wrapper">${botonVer} ${botonMeta} ${botonDescargar}</div></td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error cargando documentos:", error);
            }
        }

        async function abrirMetadatos(archivo) {
            const res = await fetch(`/api/metadatos/${archivo}`);
            if (!res.ok) { alert("Error cargando auditoría de metadatos."); return; }
            const meta = await res.json();
            
            document.getElementById('modal-archivo-origen').value = meta.archivo_descarga || '';
            document.getElementById('modal-codigo-doc').value = meta.codigo_doc || "N/A";
            document.getElementById('modal-nombre').value = meta.nombre || "";
            document.getElementById('modal-version').value = meta.version || "V-1.0";
            document.getElementById('modal-autor').value = meta.autor_subida || "Estefanía (Gestor Documental)";
            document.getElementById('modal-tamano').value = meta.tamano || "Desconocido";
            document.getElementById('modal-compania').value = meta.compania_destino || "";
            document.getElementById('modal-departamento').value = meta.departamento || "";
            document.getElementById('modal-clasificacion').value = meta.clasificacion || "Uso Interno";
            document.getElementById('modal-autorizado').value = (meta.estado === 'Authorized' || meta.estado === 'Autorizado') ? 'Autorizado' : 'En Revisión (No)';
            
            if(!bsModalInstance) {
                bsModalInstance = new bootstrap.Modal(document.getElementById('metadataBootstrapModal'));
            }
            bsModalInstance.show();
        }

        function cerrarModal() {
            if(bsModalInstance) bsModalInstance.hide();
        }

        async function guardarCambiosMetadatos() {
            const archivoOrigen = document.getElementById('modal-archivo-origen').value;
            const nuevoNombre = document.getElementById('modal-nombre').value;
            const nuevaCompania = document.getElementById('modal-compania').value;
            const nuevoDepto = document.getElementById('modal-departamento').value;
            
            const res = await fetch('/api/metadatos/editar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    archivo_descarga: archivoOrigen,
                    nombre: nuevoNombre,
                    compania_destino: nuevaCompania,
                    departamento: nuevoDepto,
                    codigo_doc: document.getElementById('modal-codigo-doc').value,
                    version: document.getElementById('modal-version').value,
                    autor_subida: document.getElementById('modal-autor').value,
                    tamano: document.getElementById('modal-tamano').value,
                    clasificacion: document.getElementById('modal-clasificacion').value
                })
            });

            if (res.ok) {
                cerrarModal();
                alert("¡Metadatos guardados con éxito!");
                cargarDocumentos();
            } else {
                alert("Error al guardar cambios de metadatos.");
            }
        }
    </script>
</body>
</html>
