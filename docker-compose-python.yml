version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/python/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  python_busqueda:
    build: ./docker/python
    container_name: python_busqueda_container
    restart: always
    volumes:
      - ./docker/python:/app
      - ./storage/actuales:/app/storage/actuales
    ports:
      - "8082:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    external: true

volumes:
  mongo_data: