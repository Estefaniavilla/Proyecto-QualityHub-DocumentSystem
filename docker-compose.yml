version: '3.8'

services:
  # Base de Datos para Estefanía (.NET)
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password
    networks:
      - app-network
    volumes:
      - shared-files:/shared/storage

  postgres_db:
    image: postgres:16
    container_name: postgres_db_container
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: quality_reports
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/php-portal/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./storage/actuales:/var/www/html/storage/actuales
    networks:
      - app-network

  # Base de Datos para Fernanda (Python/Mongo)
  mongodb:
    image: mongo:7
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      # Script de inicialización automática: crea usuarios al primer arranque
      - ./docker/python/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  # TU PORTAL PHP (Lizeth) - Mapeamos el File Server
  php-portal:
    image: chialab/php:8.2-apache
    container_name: php_portal_container
    ports:
      - "8081:80"
    volumes:
      - ./src/php-portal:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./src/php-portal/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./storage/actuales:/var/www/html/storage/actuales
    depends_on:
      - postgres_db
    networks:
      - app-network

  # fernanda
  python_busqueda:
    build: ./docker/python
    container_name: python_busqueda_container
    restart: always
    volumes:
      - ./docker/python:/app
      - ./storage/actuales:/app/storage/actuales
    ports:
      - "8082:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
      
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  shared-files: