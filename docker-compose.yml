

services:
  # Base de Datos para Estefanía (.NET)
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password
    networks:
      - app-network
    volumes:
      - shared-files:/shared/storage

  # TU Base de Datos (Lizeth - PHP)
  postgres_db:
    image: postgres:16
    container_name: postgres_db_container
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: quality_reports
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./uploads:/var/www/html/uploads
    networks:
      - app-network

  # Base de Datos para Fernanda (Python/Mongo)
  mongodb:
    image: mongo:7
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./uploads:/var/www/html/uploads
    networks:
      - app-network

  # TU PORTAL PHP (Lizeth) - Mapeamos el File Server
  php-portal:
    image: chialab/php:8.2-apache
    container_name: php_portal_container
    ports:
      - "8081:80"
    volumes:
        - ./src/php-portal:/var/www/html
        - ./uploads:/var/www/html/uploads
    depends_on:
      - postgres_db
    networks:
      - app-network

  # MÓDULO DE BÚSQUEDA (Fernanda) - Corriendo en Servidor
  busqueda-python:
    build: ./docker/python
    container_name: python_busqueda_container
    ports:
      - "8082:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    volumes:
      - ./docker/python:/app
      - ./uploads:/app/uploads
    networks:
      - app-network
    depends_on:
      - mongodb
    restart: always
  # Aquí Estefanía y Fer agregarán sus servicios después, 
  # pero ya les dejas listo el volumen compartido.

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  shared-files: 
